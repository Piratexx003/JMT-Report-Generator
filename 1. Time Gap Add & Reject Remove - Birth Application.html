<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Gap Add & Reject Remove - Birth Application</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #4a6fa5; --accent: #ff7e5f; --bg: #f5f7fa; --radius: 12px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; border-top: 6px solid var(--primary); }
        header { padding: 30px; text-align: center; }
        header h1 {
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            margin-bottom: 10px;
        }
        .upload-area { border: 2px dashed #cbd5e0; margin: 0 30px 30px; padding: 40px; border-radius: var(--radius); text-align: center; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: var(--accent); background: #fffaf9; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; }
        #processBtn { background: var(--accent); color: white; width: 220px; justify-content: center; }
        #processBtn:disabled { background: #ccc; cursor: not-allowed; }
        #downloadBtn { background: var(--primary); color: white; width: 100%; display: none; margin-top: 20px; }
        .progress-container { margin: 20px 30px; display: none; }
        .progress-bar { width: 100%; height: 10px; background: #edf2f7; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        .status-text { font-size: 0.85rem; margin-top: 5px; color: #666; text-align: center; }
        .results { padding: 30px; }
        .file-card { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary); font-size: 0.9rem; }
        .stat-badge { display: inline-block; padding: 2px 8px; background: #e2e8f0; border-radius: 4px; font-size: 0.75rem; margin: 2px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fas fa-baby"></i> Time Gap Add & Reject Remove - Birth Application</h1>
    </header>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-file-excel fa-3x" style="color: var(--primary); margin-bottom: 15px;"></i>
        <p id="fileNames">Click to select files</p>
        <input type="file" id="fileInput" accept=".xlsx" multiple style="display:none">
    </div>

    <div style="text-align: center; margin-bottom: 30px;">
        <button id="processBtn" disabled><i class="fas fa-cogs"></i> Process Files</button>
    </div>

    <div class="progress-container" id="progressArea">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <p class="status-text" id="statusText">Ready...</p>
    </div>

    <div id="results" class="results" style="display:none;">
        <div id="statsList"></div>
        <button id="downloadBtn" class="btn"><i class="fas fa-download"></i> Download Processed Batch</button>
    </div>
</div>

<script>
    let filesMap = new Map();
    let processedMap = new Map();
    let statsMap = new Map();

    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const progressArea = document.getElementById('progressArea');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');

    function getJsDate(val) {
        if (!val) return null;
        if (val instanceof Date) return isNaN(val.getTime()) ? null : val;
        if (typeof val === 'number') {
            return new Date(Math.round((val - 25569) * 86400 * 1000));
        }
        if (typeof val === 'string') {
            const parts = val.split(/[\/\-]/);
            if (parts.length === 3) {
                const d = parseInt(parts[0], 10);
                const m = parseInt(parts[1], 10) - 1;
                const y = parseInt(parts[2], 10);
                const date = new Date(y, m, d);
                return isNaN(date.getTime()) ? null : date;
            }
        }
        return null;
    }

    fileInput.addEventListener('change', async () => {
        const files = Array.from(fileInput.files);
        if (files.length === 0) return;
        filesMap.clear();
        document.getElementById('fileNames').innerHTML = `<b>${files.length}</b> files loaded`;
        
        await Promise.all(files.map(file => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
                    filesMap.set(file.name, wb);
                    resolve();
                };
                reader.readAsArrayBuffer(file);
            });
        }));
        processBtn.disabled = false;
    });

    processBtn.addEventListener('click', async () => {
        processBtn.disabled = true;
        progressArea.style.display = 'block';
        processedMap.clear();
        statsMap.clear();

        const entries = Array.from(filesMap.entries());
        for(let i=0; i < entries.length; i++) {
            const [name, wb] = entries[i];
            statusText.textContent = `Processing: ${name}`;
            const result = await processWorkbook(wb);
            processedMap.set(name, result.wb);
            statsMap.set(name, result.stats);
            progressFill.style.width = ((i + 1) / entries.length * 100) + '%';
            await new Promise(r => setTimeout(r, 10)); 
        }

        renderStats();
        document.getElementById('results').style.display = 'block';
        downloadBtn.style.display = 'inline-flex';
        statusText.textContent = "Processing Finished!";
        processBtn.disabled = false;
    });

    async function processWorkbook(workbook) {
        const stats = {};
        const newWb = XLSX.utils.book_new();

        for (const sheetName of workbook.SheetNames) {
            const ws = workbook.Sheets[sheetName];
            let data = XLSX.utils.sheet_to_json(ws, { header: 1 });
            if (data.length < 2) continue;

            const headers = data[0].map(h => String(h || "").trim());
            const idx = {
                dob: headers.indexOf('Date Of Birth'),
                rep: headers.findIndex(h => h.toLowerCase().includes('reporting date') || h.toLowerCase().includes('entry date')),
                status: headers.indexOf('Status'),
                role: headers.indexOf('Data Entered by (Role)'),
                type: headers.indexOf('Appl Type')
            };

            if (idx.rep === -1) idx.rep = 0; 
            headers.splice(idx.dob + 1, 0, "Time Gap");

            const processedRows = data.slice(1).map(row => {
                const status = String(row[idx.status] || "").trim().toUpperCase();
                const role = String(row[idx.role] || "").trim().toUpperCase();

                // REMOVE LOGIC: CITIZEN + APPLICATION SUBMITTED or REJECTED
                if (role === 'CITIZEN' && (status === 'APPLICATION SUBMITTED' || status === 'REJECTED')) {
                    return null;
                }

                // REMOVE LOGIC: DEO ROLES + REJECTED
                const deoRoles = ['GOVTHOSPITALDEO', 'PVTHOSPITALDEO', 'PANCHAYATDEO', 'ULBDEO'];
                if (deoRoles.includes(role) && status === 'REJECTED') {
                    return null;
                }

                const dobDate = getJsDate(row[idx.dob]);
                const repDate = getJsDate(row[idx.rep]);

                let gap = "";
                if (dobDate && repDate) {
                    const d1 = new Date(dobDate.getFullYear(), dobDate.getMonth(), dobDate.getDate());
                    const d2 = new Date(repDate.getFullYear(), repDate.getMonth(), repDate.getDate());
                    gap = Math.floor((d2 - d1) / 86400000);
                }

                const year = dobDate ? dobDate.getFullYear() : "Unknown";
                const type = row[idx.type] || "Others";
                if(!stats[year]) stats[year] = {};
                stats[year][type] = (stats[year][type] || 0) + 1;

                const formattedRow = [...row];
                formattedRow[idx.dob] = dobDate ? `${String(dobDate.getDate()).padStart(2,'0')}/${String(dobDate.getMonth()+1).padStart(2,'0')}/${dobDate.getFullYear()}` : row[idx.dob];
                formattedRow.splice(idx.dob + 1, 0, gap);
                return formattedRow;
            }).filter(r => r !== null);

            processedRows.sort((a, b) => {
                const da = getJsDate(a[idx.dob]) || new Date(0);
                const db = getJsDate(b[idx.dob]) || new Date(0);
                return da - db;
            });

            XLSX.utils.book_append_sheet(newWb, XLSX.utils.aoa_to_sheet([headers, ...processedRows]), sheetName);
        }
        return { wb: newWb, stats };
    }

    downloadBtn.addEventListener('click', async () => {
        downloadBtn.disabled = true;
        const entries = Array.from(processedMap.entries());
        
        for (let i = 0; i < entries.length; i++) {
            const [name, wb] = entries[i];
            statusText.textContent = `Downloading (${i+1}/${entries.length}): ${name}`;
            XLSX.writeFile(wb, name.replace('.xlsx', '_processed.xlsx'));
            if (i < entries.length - 1) {
                await new Promise(r => setTimeout(r, 1000));
            }
        }
        
        statusText.textContent = "All files saved!";
        downloadBtn.disabled = false;
    });

    function renderStats() {
        const out = document.getElementById('statsList');
        out.innerHTML = '';
        statsMap.forEach((stats, name) => {
            let html = `<div class="file-card"><strong>${name}</strong><br>`;
            Object.keys(stats).sort().reverse().forEach(year => {
                html += `<div style="margin-top:4px;">${year}: `;
                for(let type in stats[year]) {
                    html += `<span class="stat-badge">${type}: ${stats[year][type]}</span>`;
                }
                html += `</div>`;
            });
            out.innerHTML += html + `</div>`;
        });
    }
</script>
</body>
</html>
